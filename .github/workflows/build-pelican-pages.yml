name: Deploy to GitHub Pages
on:
  workflow_dispatch:
jobs:
  deploy:
    uses: "getpelican/pelican/.github/workflows/github_pages.yml@main"
    permissions:
      contents: "read"
      pages: "write"
      id-token: "write"
    with:
      settings: "pelican/pelicanconf.py"
      requirements: "-r requirements.txt"
      python: "3.10.12"
